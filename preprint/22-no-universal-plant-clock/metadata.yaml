abstract: >
  Modern distributed systems routinely behave as though they possess a shared
  present, interchangeable clocks, fresh state observations, and timely control
  channels. In practice, none of these assumptions is guaranteed. This paper
  introduces a four-layer model of temporal failure in distributed control
  systems: (1) gauge mismatch in the construction of shared temporal reference
  frames, (2) clock divergence in the accumulation of local elapsed time,
  (3) retarded-state estimation under delayed observation, and (4) delayed
  actuation in closed-loop control. The framework treats temporal coherence not
  as a metaphysical property but as an operational constraint and, in many
  systems, a scarce control resource. We introduce characteristic timescale
  ratios and show that the dominant failure mode in a given system is determined
  by which ratio has the least remaining margin to its critical threshold.
