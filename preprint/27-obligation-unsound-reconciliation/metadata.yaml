abstract: >
  Reconciliation controllers are commonly specified in terms of
  convergence: given a desired state, the controller should eventually
  drive observed state toward that target and maintain it. This paper
  identifies a complementary safety property missing from that
  correctness vocabulary: transition admissibility. A reconciliation
  transition may restore desired state while silently degrading the
  obligations required for later diagnosis, governance, or operator
  reliance — including evidence, causality, custody, authority,
  continuity, and substrate accountability. We model Kubernetes-style
  controllers as operating over lossy projections of substrate state.
  When the projection collapses substrate states that carry different
  operator obligations, the controller produces an obligation-unsound
  quotient: convergence-correct, operator-unsound. We define
  ephemerality not as an object property but as a transition property
  under declared obligations and retention horizons. Three audit
  states — Masked recovery, Orphaned causality, DegradedWithReceipt —
  distinguish failure modes from constructive use of an open finding.
  A receipt durability invariant requires receipts to outlive the
  longest-lived affected obligation. Three worked Kubernetes scenarios
  exercise the vocabulary and force the audit-state distinctions. The
  result is a formal complement to convergence-oriented controller
  verification: a controller may be correct with respect to
  desired-state convergence while remaining unsound with respect to
  operational testimony. P27 sits at the constructive endpoint of the
  P22–P26 negative spine: P25 establishes that substitution is
  structurally forced under observability asymmetry; P26 formalizes
  empty-window failure under temporal detachment; P27 names how to
  govern transitions so that what was sensed is not silently destroyed.
