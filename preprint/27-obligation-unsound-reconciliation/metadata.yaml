abstract: >
  Reconciliation controllers are commonly specified in terms of
  convergence: given a desired state, the controller should eventually
  drive observed state toward that target and maintain it. This paper
  identifies a complementary safety property the convergence vocabulary
  does not express: transition admissibility. A reconciliation
  transition may restore desired state while silently degrading the
  obligations operators rely on for later diagnosis, governance, or
  accountability — including evidence, causality, custody, authority,
  continuity, and substrate accountability. We model Kubernetes-style
  controllers as operating over lossy projections of substrate state.
  When the projection collapses substrate states that carry different
  operator obligations, the controller produces an obligation-unsound
  quotient: convergence-correct, operator-unsound. Three audit
  states — Masked, Orphaned, DegradedWithReceipt — distinguish failure
  modes from the constructive case where an open finding remains
  admissible. A receipt durability invariant requires the receipt's
  persistence, retrieval, and authority-separation horizons each to
  outlive the longest-lived affected obligation. Three worked
  Kubernetes scenarios exercise the vocabulary and force the
  audit-state distinctions.
