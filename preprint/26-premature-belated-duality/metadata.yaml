abstract: >
  STUB. Premature commitment and belated consequence are dual
  orientations of Δt detachment: the former binds before
  admissibility has matured; the latter binds after consequence
  can still attach. This paper formalizes the duality via two
  curves on the temporal axis — admissibility maturity m(t) and
  consequence viability c(t) — and the valid binding window
  W = { t | m(t) ≥ θ_m ∧ c(t) ≥ θ_c }. Premature is binding at
  t with m(t) < θ_m; belated is binding at t with c(t) < θ_c.
  The empty-window case (W = ∅) and the asymmetric-power case
  (one party can compress own m, preserve own c, decelerate
  others' m, and accelerate others' c — "power buys time twice")
  are characterized as the two failure modes of Δt detachment
  under sibling status to Paper 25.
